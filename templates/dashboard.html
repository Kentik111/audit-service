{% extends "base.html" %}

{% block content %}
<h2 class="mb-4"><i class="bi bi-bar-chart-line"></i> Аналитический дашборд</h2>

<div class="row">
    <!-- График 1: Распределение по критичности -->
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0">Распределение по критичности</h5>
            </div>
            <div class="card-body">
                <canvas id="criticalityChart"></canvas>
            </div>
        </div>
    </div>

    <!-- График 2: Распределение по статусам -->
    <div class="col-md-6 mb-4">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0">Распределение по статусам</h5>
            </div>
            <div class="card-body">
                <canvas id="statusChart"></canvas>
            </div>
        </div>
    </div>

    <!-- График 3: Нарушения по системам -->
    <div class="col-md-8 mb-4">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0">Количество нарушений по системам</h5>
            </div>
            <div class="card-body">
                <canvas id="systemsChart"></canvas>
            </div>
        </div>
    </div>

    <!-- График 4: Динамика по месяцам -->
    <div class="col-md-4 mb-4">
        <div class="card h-100">
            <div class="card-header">
                <h5 class="mb-0">Динамика обнаружения</h5>
            </div>
            <div class="card-body">
                <canvas id="monthlyChart"></canvas>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block scripts %}
<script>
    // Загрузка данных через API
    fetch('/api/dashboard_data')
        .then(response => response.json())
        .then(data => {
            // График критичности
            const critCtx = document.getElementById('criticalityChart').getContext('2d');
            new Chart(critCtx, {
                type: 'doughnut',
                data: {
                    labels: Object.keys(data.criticality),
                    datasets: [{
                        data: Object.values(data.criticality),
                        backgroundColor: ['#28a745', '#17a2b8', '#ffc107', '#dc3545'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });

            // График статусов
            const statusCtx = document.getElementById('statusChart').getContext('2d');
            new Chart(statusCtx, {
                type: 'pie',
                data: {
                    labels: Object.keys(data.status),
                    datasets: [{
                        data: Object.values(data.status),
                        backgroundColor: ['#6c757d', '#007bff', '#28a745', '#343a40'],
                        borderWidth: 0
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { position: 'bottom' }
                    }
                }
            });

            // График по системам (горизонтальные столбцы)
            const sysCtx = document.getElementById('systemsChart').getContext('2d');
            new Chart(sysCtx, {
                type: 'bar',
                data: {
                    labels: Object.keys(data.systems),
                    datasets: [{
                        label: 'Количество нарушений',
                        data: Object.values(data.systems),
                        backgroundColor: '#0d6efd',
                        borderRadius: 5
                    }]
                },
                options: {
                    indexAxis: 'y',
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });

            // График динамики
            const monthlyCtx = document.getElementById('monthlyChart').getContext('2d');
            new Chart(monthlyCtx, {
                type: 'line',
                data: {
                    labels: Object.keys(data.monthly),
                    datasets: [{
                        label: 'Обнаружено',
                        data: Object.values(data.monthly),
                        borderColor: '#dc3545',
                        backgroundColor: 'rgba(220, 53, 69, 0.1)',
                        tension: 0.3,
                        fill: true
                    }]
                },
                options: {
                    responsive: true,
                    plugins: {
                        legend: { display: false }
                    }
                }
            });
        });
</script>
{% endblock %}
